<svg font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"><rect width="900" height="380" fill="#ffffff"/><marker id="a" markerHeight="10" markerWidth="10" orient="auto" refX="8" refY="5"><path d="m0 0 10 5-10 5z" fill="#424a53"/></marker><text fill="#1f2328" font-size="20" font-weight="700" text-anchor="middle" x="450" y="36">系統架構</text><rect fill="#fff8c5" height="180" rx="10" stroke="#9a6700" stroke-width="2" width="180" x="30" y="80"/><g text-anchor="middle"><text fill="#1f2328" font-size="15" font-weight="700" x="120" y="110">升降桌</text><text fill="#57606a" font-size="12" x="120" y="130">Funte + JCB35M12C</text><text fill="#57606a" font-size="12" x="120" y="160">─────────</text><text fill="#57606a" font-size="12" x="120" y="184">副 RJ12 (UART)</text><text fill="#57606a" font-size="12" x="120" y="204">↓ 雙向 9600 baud</text><text fill="#57606a" font-size="12" x="120" y="234">高度 70.6~119 cm</text></g><rect fill="#ddf4ff" height="180" rx="10" stroke="#0969da" stroke-width="2" width="180" x="250" y="80"/><text fill="#1f2328" font-size="15" font-weight="700" text-anchor="middle" x="340" y="110">ESP-WROOM-32</text><text fill="#57606a" font-size="12" text-anchor="middle" x="340" y="130">+ ESPHome 韌體</text><text fill="#57606a" font-size="12" text-anchor="middle" x="340" y="160">─────────</text><text fill="#57606a" font-size="12" text-anchor="middle" x="340" y="184">jiecang_desk_controller</text><text fill="#57606a" font-size="12" text-anchor="middle" x="340" y="204">(Rocka84 external)</text><text fill="#57606a" font-size="12" text-anchor="middle" x="340" y="234">WiFi → HA API</text><rect fill="#dafbe1" height="180" rx="10" stroke="#1a7f37" stroke-width="2" width="180" x="470" y="80"/><text fill="#1f2328" font-size="15" font-weight="700" text-anchor="middle" x="560" y="110">Home Assistant</text><text fill="#57606a" font-size="12" text-anchor="middle" x="560" y="130">ESPHome 整合</text><text fill="#57606a" font-size="12" text-anchor="middle" x="560" y="160">─────────</text><text fill="#57606a" font-size="12" text-anchor="middle" x="560" y="184">sensor / button / number</text><text fill="#57606a" font-size="12" text-anchor="middle" x="560" y="204">+ template cover</text><text fill="#57606a" font-size="12" text-anchor="middle" x="560" y="234">+ Mushroom 儀表板</text><rect fill="#fbefff" height="180" rx="10" stroke="#8250df" stroke-width="2" width="180" x="690" y="80"/><text fill="#1f2328" font-size="15" font-weight="700" text-anchor="middle" x="780" y="110">Apple Home</text><text fill="#57606a" font-size="12" text-anchor="middle" x="780" y="130">HomeKit Bridge</text><text fill="#57606a" font-size="12" text-anchor="middle" x="780" y="160">─────────</text><text fill="#57606a" font-size="12" text-anchor="middle" x="780" y="184">桌子 = 窗簾</text><text fill="#57606a" font-size="12" text-anchor="middle" x="780" y="204">% 滑桿控制高度</text><text fill="#57606a" font-size="12" text-anchor="middle" x="780" y="234">Hey Siri</text><path d="m210 170h40" fill="none" marker-end="url(#a)" stroke="#424a53" stroke-width="2"/><text fill="#57606a" font-size="11" text-anchor="middle" x="230" y="158">RJ12</text><path d="m430 170h40" fill="none" marker-end="url(#a)" stroke="#424a53" stroke-width="2"/><text fill="#57606a" font-size="11" text-anchor="middle" x="450" y="158">WiFi</text><path d="m650 170h40" fill="none" marker-end="url(#a)" stroke="#424a53" stroke-width="2"/><text fill="#57606a" font-size="11" text-anchor="middle" x="670" y="158">mDNS</text><text fill="#57606a" font-size="12" text-anchor="middle" x="450" y="310">桌子的升降指令 / 高度回報全程由 ESP32 中繼，控制器與手機完全隔離</text><text fill="#57606a" font-size="12" text-anchor="middle" x="450" y="332">不需要拆桌、不需要剪原裝手控器線，只用副 RJ12</text></svg>